name: Capture timelesz Request Ranking

on:
  workflow_dispatch:
  schedule:
    # Every hour
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture timelesz request ranking
        env:
          RANKING_WEB_APP_URL: ${{ secrets.RANKING_WEB_APP_URL }}
        run: node scripts/capture-timelesz-request-ranking.js

      - name: Commit timelesz request ranking data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/timeleszRequestRankingJson.json
          git commit -m "Update timelesz request ranking data" || echo "No changes to commit"
          git push
