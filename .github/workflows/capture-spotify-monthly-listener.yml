name: Capture Spotify Monthly Listener

on:
  workflow_dispatch:
  schedule:
    # JST 09:10 = UTC 00:10
    - cron: "10 0 * * *"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture Spotify monthly listener
        run: node scripts/capture-spotify-monthly-listener.js

      - name: Commit monthly listener data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/spotifyMonthlyListenerJson.json
          git commit -m "Update Spotify monthly listener data" || echo "No changes to commit"
          git push
