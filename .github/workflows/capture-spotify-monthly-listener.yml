name: Capture Spotify Monthly Listener

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture Spotify monthly listener
        env:
          SPOTIFY_WEB_APP_URL: ${{ secrets.RANKING_WEB_APP_URL }}
        run: node scripts/capture-spotify-monthly-listener.js
