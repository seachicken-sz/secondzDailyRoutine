<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <title>TVerランキング推移レポート</title>

  <link rel="stylesheet" href="./style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./report.js" defer></script>
</head>

<body>
  <div class="program-select-area">
    <a class="back-to-app-button" href="../app/">
      ←
    </a>
  
    <label for="programSelect" class="program-select-label">番組を選ぶ</label>
    <select id="programSelect" class="program-select"></select>
  
    <button id="reloadDataButton" class="reload-data-button" type="button">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <main class="report" id="reportCaptureArea">
    <div class="top-bar" id="reportTopBar">TVerランキング推移レポート</div>

    <section class="hero">
      <div id="programTitle" class="program-title"></div>
      <div id="programMeta" class="meta"></div>
    </section>

    <section id="rankCards" class="rank-cards"></section>

    <section class="stats">
      <div class="stat">
        <span class="stat-icon"><i class="bi bi-hand-thumbs-up-fill"></i></span>
        <span class="stat-label">いいね数</span>
        <strong id="likeCount"></strong>
      </div>

      <div class="stat">
        <span class="stat-icon"><i class="bi bi-heart"></i></span>
        <span class="stat-label">お気に入り数</span>
        <strong id="favoriteCount"></strong>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-title" id="chartSectionTitle">ランキング推移</div>
      <div id="charts" class="charts"></div>
    </section>

    <section class="table-section" id="bottomSection">
      <div id="nearbyRankingTables" class="tables"></div>
    </section>

    <div class="footer">
      データ出典：TVer<br>本データは個人がTVerをより楽しむために作成された資料であり、公式とは一切関係がありません。<br>※1時間ごと更新
    </div>
  </main>

  <section id="currentRankingPreviewSection" class="current-ranking-preview-section">
    <div class="section-title">2枚目プレビュー</div>
    <div id="currentRankingPreview"></div>
  </section>

  <div id="newEpisodeLink"></div>

  <div class="link-wrap">
    <a href="https://seachicken-sz.github.io/secondzDailyRoutine/app/">
      <img src="https://seachicken-sz.github.io/secondzDailyRoutine/img/link-card.jpg">
    </a>
  </div>
  
  <div class="save-area">
    <button id="saveImageButton" class="save-button" type="button">
      <i class="bi bi-box-arrow-down"></i>
      グラフを保存して投稿
    </button>
  </div>
</body>
</html>
