<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し活デイリー</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <p class="step-label">STEP 1</p>
      <h1>Spotifyで再生する曲を選ぶ</h1>
      <p class="description">
        今日のBGMにする曲を選んで、Spotifyで開いてください。
      </p>
    </header>

    <section id="selectedArea" class="selected-area hidden">
      <p class="selected-label">選択中</p>
      <p id="selectedSongName" class="selected-song"></p>
      <button id="openSpotifyButton" class="primary-button">
        Spotifyで開く
      </button>
    </section>

    <section class="song-section">
      <h2>おすすめ</h2>
      <div id="recommendedSongs" class="song-list"></div>
    </section>

    <section class="song-section">
      <h2>その他</h2>
      <div id="otherSongs" class="song-list"></div>
    </section>

    <section id="errorArea" class="error-area hidden"></section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
