<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://unpkg.com/phosphor-icons" rel="stylesheet">
  <title>TVer 48時間ランキング推移レポート</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #e8f7ff, #fff4fb);
      color: #10213f;
    }

    .report {
      width: 760px;
      margin: 0 auto;
      padding-bottom: 24px;
      background:
        radial-gradient(#bde8ff 1px, transparent 1px),
        linear-gradient(135deg, #ffffff 0%, #f2fbff 55%, #fff1fa 100%);
      background-size: 10px 10px, auto;
      border-radius: 0 0 24px 24px;
      overflow: hidden;
    }

    .top-bar {
      background: #071d54;
      color: white;
      text-align: center;
      font-weight: 700;
      padding: 6px;
      font-size: 18px;
    }

    .hero {
      text-align: center;
      padding: 22px 24px 14px;
    }

    .program-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 14px;
      line-height: 1.8;
    }

    .rank-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 0 28px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(27, 70, 120, 0.22);
      padding: 16px;
      text-align: center;
    }

    .label {
      display: inline-block;
      color: white;
      padding: 6px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }

    .blue { background: #0877df; }
    .pink { background: #ec2386; }

    .rank-main {
      margin-top: 10px;
      font-size: 76px;
      font-weight: 800;
      line-height: 1;
    }

    .rank-main span {
      font-size: 36px;
      margin-left: 8px;
    }

    .sub-rank {
      margin: 10px auto 0;
      width: 220px;
      border-radius: 8px;
      padding: 6px;
      font-weight: 700;
    }

    .sub-rank.blue-bg {
      background: #e9f4ff;
      color: #0877df;
    }

    .sub-rank.pink-bg {
      background: #fff0f7;
      color: #ec2386;
    }

    .stats {
      margin: 14px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(27, 70, 120, 0.22);
      overflow: hidden;
      font-weight: 700;
    }

    .stat {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 18px;
    }

    .stat + .stat {
      border-left: 1px solid #d6e4ef;
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #edf4fa;
      color: #5b9eea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
    }

    .stat-label {
      font-weight: 700;
      color: #40536d;
    }

    .stat strong {
      margin-left: 4px;
      font-size: 28px;
      color: #36bfd0;
    }

    .chart-section,
    .table-section {
      margin: 14px 28px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(27, 70, 120, 0.22);
      padding: 18px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .chart-box {
      min-width: 0;
    }

    .chart-title {
      color: white;
      text-align: center;
      border-radius: 999px;
      padding: 6px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .chart-canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
    }

    .chart-canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 3 / 1.8;
    }

    .tables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .table-title {
      color: white;
      text-align: center;
      padding: 8px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 48px 1fr;
      padding: 9px 12px;
      font-size: 14px;
      background: #f6f8fb;
      margin-bottom: 4px;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #6c7a90;
      padding: 4px 20px 0;
    }
  </style>
</head>

<body>
  <main class="report">
    <div class="top-bar">TVer 48時間ランキング推移レポート</div>

    <section class="hero">
      <div id="programTitle" class="program-title"></div>
      <div id="programMeta" class="meta"></div>
    </section>

    <section class="rank-cards">
      <div class="card">
        <div class="label blue">バラエティランキング</div>
        <div id="varietyCurrentRank" class="rank-main" style="color:#0877df;"></div>
        <div id="varietyElapsedRank" class="sub-rank blue-bg"></div>
      </div>

      <div class="card">
        <div class="label pink">総合ランキング</div>
        <div id="overallCurrentRank" class="rank-main" style="color:#ec2386;"></div>
        <div id="overallElapsedRank" class="sub-rank pink-bg"></div>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <span class="stat-icon">👍</span>
        <span class="stat-label">いいね数</span>
        <strong id="likeCount"></strong>
      </div>

      <div class="stat">
        <span class="stat-icon">★</span>
        <span class="stat-label">お気に入り数</span>
        <strong id="favoriteCount"></strong>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-title">ランキング推移（48時間）</div>

      <div class="charts">
        <div class="chart-box">
          <div class="chart-title blue">バラエティ</div>
          <div class="chart-canvas-wrap">
            <canvas id="varietyChart"></canvas>
          </div>
        </div>

        <div class="chart-box">
          <div class="chart-title pink">総　合</div>
          <div class="chart-canvas-wrap">
            <canvas id="overallChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section class="table-section">
      <div class="tables">
        <div>
          <div class="table-title blue">バラエティすぐ上ランキング</div>
          <div id="varietyNearbyRanking"></div>
        </div>

        <div>
          <div class="table-title pink">総合すぐ上ランキング</div>
          <div id="overallNearbyRanking"></div>
        </div>
      </div>
    </section>

    <div class="footer">
      データ出典：TVer 本データは個人がTVerをより楽しむために作成された資料であり、公式とは一切関係がありません。
    </div>
  </main>

  <script>
    const report = {
      programTitle: "夜の音 -TOKYO MIDNIGHT MUSIC-",
      broadcastDate: "2026/05/13",
      updatedAt: "2026/05/14 11:00",
      subtitle: "代理MC 田中樹！SEKAI NO OWARI & ちゃんみな豪華コラボ",

      likes: "11,000",
      favorites: "4.9万",

      variety: {
        currentRank: 13,
        elapsedHour: 36,
        elapsedRank: 13,
        currentData: [
          null, null, null, null, null, null, 50, 39, 31, 28, 30, 24,
          25, 21, 20, 18, 16, 14, 13, 12, 12, 12, 12, 12,
          13, 12, 12, 13, 12, 12, 13, null, null, null, null, null,
          null, null, null, null, null, null, null, null, null, null, null, null
        ],
        previousData: [
          null, null, null, null, null, null, null, null, null, null, null, null,
          null, null, null, null, null, null, null, null, 49, 43, 40, 38,
          40, 42, 44, 46, 47, null, null, null, null, null, null, null,
          null, null, null, null, null, null, null, null, null, null, null, null
        ],
        nearbyRanking: [
          { rank: 10, title: "謎る！さんま御殿!!" },
          { rank: 11, title: "あちこちオードリー" },
          { rank: 12, title: "世界の果てまでイッテQ！" },
          { rank: 13, title: "夜の音 -TOKYO MIDNIGHT MUSIC-" }
        ]
      },

      overall: {
        currentRank: 24,
        elapsedHour: 36,
        elapsedRank: 32,
        currentData: [
          null, null, null, null, null, null, null, null, null, null, null, 50,
          47, 43, 38, 35, 31, 28, 25, 24, 24, 24, 24, 25,
          25, 25, 26, 27, 27, 31, 32, 32, 32, null, null, null,
          null, null, null, null, null, null, null, null, null, null, null, null
        ],
        previousData: [],
        nearbyRanking: [
          { rank: 29, title: "102回目のプロポーズ" },
          { rank: 30, title: "鍵のかかった部屋" },
          { rank: 31, title: "今夜、秘密のキッチンで" },
          { rank: 32, title: "夜の音 -TOKYO MIDNIGHT MUSIC-" }
        ]
      }
    };

    const labels = Array.from({ length: 48 }, (_, i) => i + 1);

    function renderReport(data) {
      document.title = `${data.programTitle} ${data.broadcastDate}｜TVer 48時間ランキング推移レポート`;

      document.getElementById("programTitle").textContent = data.programTitle;
      document.getElementById("programMeta").innerHTML = `
        ${data.broadcastDate}　放送　（ ${data.updatedAt}　更新 ）<br>
        ${data.subtitle}
      `;

      document.getElementById("varietyCurrentRank").innerHTML = `${data.variety.currentRank}<span>位</span>`;
      document.getElementById("varietyElapsedRank").textContent =
        `${data.variety.elapsedHour}時間目　${data.variety.elapsedRank}　位`;

      document.getElementById("overallCurrentRank").innerHTML = `${data.overall.currentRank}<span>位</span>`;
      document.getElementById("overallElapsedRank").textContent =
        `${data.overall.elapsedHour}時間目　${data.overall.elapsedRank}　位`;

      document.getElementById("likeCount").textContent = data.likes;
      document.getElementById("favoriteCount").textContent = data.favorites;

      renderNearbyRanking("varietyNearbyRanking", data.variety.nearbyRanking);
      renderNearbyRanking("overallNearbyRanking", data.overall.nearbyRanking);

      createRankingChart("varietyChart", data.variety.currentData, data.variety.previousData, "#0877df");
      createRankingChart("overallChart", data.overall.currentData, data.overall.previousData, "#ec2386");
    }

    function renderNearbyRanking(elementId, rankingList) {
      document.getElementById(elementId).innerHTML = rankingList.map(item => `
        <div class="row">
          <span>${item.rank}</span>
          <span>${item.title}</span>
        </div>
      `).join("");
    }

    function createRankingChart(canvasId, currentData, previousData, color) {
      const datasets = [
        {
          label: "最新回",
          data: currentData,
          borderColor: color,
          backgroundColor: color,
          tension: 0.35,
          pointRadius: 2,
          pointHoverRadius: 2,
          borderWidth: 1.5,
          spanGaps: true
        }
      ];

      if (Array.isArray(previousData) && previousData.length > 0) {
        datasets.push({
          label: "前回",
          data: previousData,
          borderColor: "#aab3bd",
          backgroundColor: "#aab3bd",
          tension: 0.35,
          pointRadius: 2,
          pointHoverRadius: 2,
          borderWidth: 1.5,
          spanGaps: true
        });
      }

      new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
          labels,
          datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1.5,
          resizeDelay: 100,
          scales: {
            y: {
              reverse: true,
              min: 1,
              max: 50,
              border: {
                display: false
              },
              grid: {
                display: true,
                color: "#e5edf5",
                drawTicks: false
              },
              ticks: {
                stepSize: 10,
                padding: 8,
                callback: function(value) {
                  if (value === 1) {
                    return "1";
                  }
                  return value;
                }
              }
            },
            x: {
              border: {
                display: false
              },
              grid: {
                display: false,
                drawTicks: false
              },
              ticks: {
                maxTicksLimit: 8,
                padding: 6
              }
            }
          },
          plugins: {
            legend: {
              display: false
            }
          }
        }
      });
    }

    renderReport(report);

    /*
    外部JSON化する場合は、上の renderReport(report); を消してこれに変更。

    async function initializeReport() {
      const response = await fetch("../data/tverRankingReport.json");
      const data = await response.json();
      renderReport(data);
    }

    initializeReport();
    */
  </script>
</body>
</html>
